apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atelier-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Groubix/atelier-k8s-gitops.git
    targetRevision: develop
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: { prune: true, selfHeal: true }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atelier-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Groubix/atelier-k8s-gitops.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
