apiVersion: apps/v1
kind: Deployment
metadata:
  name: atelier-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: atelier-app
  template:
    metadata:
      labels:
        app: atelier-app
    spec:
      containers:
        - name: app
          image: docker.io/library/atelier-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: atelier-app-secret
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: atelier-app-config
